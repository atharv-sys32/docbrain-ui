name: Build and Publish Frontend Image

on:
  push:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository is usually "username/repo-name"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # These permissions are required to push to GHCR
    permissions:
      contents: read
      packages: write
    outputs:
      changes_detected: ${{ steps.changed.outputs.any_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: tj-actions/changed-files@v44
        id: changed
        with:
          files: |
            src/**
            Dockerfile
            nginx/**
            package.json
            index.html
            vite.config.ts
            tsconfig.json
            tsconfig.app.json
            tsconfig.node.json
            eslint.config.js

      # Because we are using GHCR, we don't need to create any secrets!
      # GitHub automatically provides a temporary GITHUB_TOKEN for this step.
      - name: Log in to the Container registry
        if: steps.changed.outputs.any_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step automatically tags your image (e.g., with 'latest' and the git commit hash)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        if: steps.changed.outputs.any_changed == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Ensures the image name is converted to lowercase (Docker requirement)
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        if: steps.changed.outputs.any_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.ref == 'refs/heads/main' && needs.build-and-push-image.outputs.changes_detected == 'true'
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/docbrain
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d

server {
    listen 80;
    server_name localhost;

    # Where Nginx will look for your React static files
    root /usr/share/nginx/html;
    index index.html;

    # This is CRUCIAL for React Router (Single Page Applications)
    # If someone goes to yourdomain.com/dashboard, the server doesn't have a folder named "dashboard".
    # This tells Nginx: "Try to find the file, if it doesn't exist, just serve index.html and let React handle the routing."
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optimization: Tell the browser to cache static assets for a year
    location ~* \.(?:css|js|jpg|svg|png|ico|woff2?|eot|ttf)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }
}

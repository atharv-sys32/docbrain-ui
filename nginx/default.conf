server {
    listen 80;
    server_name docbrainn.duckdns.org www.docbrainn.duckdns.org localhost;

    # Where Nginx will look for your React static files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api requests to the Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle React Router (Single Page Applications)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optimization: Tell the browser to cache static assets for a year
    location ~* \.(?:css|js|jpg|svg|png|ico|woff2?|eot|ttf)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }
}
